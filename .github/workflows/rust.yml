# SPDX-License-Identifier: MIT OR Apache-2.0

name: Rust CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
permissions: {}

jobs:
  linting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-hack
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: cargo-hack

      - name: Install Nightly Rust Toolchain
        run: |
          rustup toolchain install nightly --profile minimal --component rustfmt,clippy --no-self-update
          rustup default nightly

      - name: Install Boost
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev

      - name: Spell check
        uses: crate-ci/typos@5374cbf686e897b15713110e233094e2874de7ef # v1.46.1
        with:
          config: ./_typos.toml

      - name: Run cargo fmt
        run: cargo +nightly fmt --all --check

      - name: Run cargo doc
        run: |
          RUSTDOCFLAGS="--cfg docsrs -D warnings" \
          cargo +nightly doc --workspace --no-deps --lib --all-features --document-private-items

      - name: Run cargo clippy
        run: ./contrib/feature_matrix.sh clippy '-- -D warnings'
        shell: bash # Ensure the script runs using bash on all platforms

  cross-testing:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install 1.85.0 Rust Toolchain
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt,clippy --no-self-update
          rustup default 1.85.0

      - name: Install cargo-hack
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: cargo-hack

      - name: Install Boost (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev

      - name: Install Boost (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install boost

      - name: Install Boost (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          triplet=x64-windows
          vcpkgRoot="${VCPKG_INSTALLATION_ROOT:-C:/vcpkg}"

          # Pin vcpkg to the baseline vendored by libbitcoinkernel-sys's Bitcoin Core subtree
          # (2025.08.27 release; matches bitcoin/vcpkg.json in the crate's vendored source)
          git -C "$vcpkgRoot" fetch --depth=1 origin 120deac3062162151622ca4860575a33844ba10b
          git -C "$vcpkgRoot" checkout 120deac3062162151622ca4860575a33844ba10b

          "$vcpkgRoot/bootstrap-vcpkg.bat"

          "$vcpkgRoot/vcpkg.exe" install \
          boost-system \
          boost-filesystem \
          boost-thread \
          boost-multi-index \
          --triplet "$triplet" \
          --clean-after-build \
          --disable-metrics

          boostRoot="$vcpkgRoot/installed/$triplet"

          echo "BOOST_ROOT=$boostRoot" >> "$GITHUB_ENV"

      # Bi-weekly numbers to refresh caches every two weeks, ensuring recent project changes are cached
      - name: Set bi-weekly cache key
        # Use '10#' to always treat week number as base-10 (avoids octal when number has a leading zero)
        run: |
          YEAR=$(date +%Y)
          WEEK=$(date +%U)
          BIWEEK=$(( (10#$WEEK + 1) / 2 ))
          echo "CACHE_VERSION=${YEAR}(${BIWEEK})" >> $GITHUB_ENV
        shell: bash

      # Restore cached dependencies and build artifacts
      - name: Restore Rust cache
        id: cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/release/
          # Cache key depends on the bi-week we are on (cache version)
          key: ${{ runner.os }}-cargo-${{ env.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-cargo-

      # Build only the binaries
      - name: Build binaries
        run: cargo build --release --bins --verbose

      # Run the feature testing script
      - name: Run feature tests
        run: ./contrib/feature_matrix.sh test --verbose
        shell: bash # Ensure the script runs using bash on all platforms

      # Save cache only if the previous steps succeeded and there was not an exact cache key match
      # This happens everytime we modify any `cargo.lock` or `cargo.toml`, or each two weeks (caching recent changes)
      - name: Save Rust cache
        if: success() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/release/
          key: ${{ steps.cache.outputs.cache-primary-key }}

  no-std:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: floresta-common
            feature_args: ""

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install 1.85.0 Rust Toolchain and no-std Target
        run: |
          rustup toolchain install 1.85.0 --profile minimal --target thumbv7em-none-eabi --no-self-update
          rustup default 1.85.0

      - name: Install ARM GCC (for secp256k1-sys)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Build ${{ matrix.crate }} for no_std target
        shell: bash
        run: |
          cargo build -p "${{ matrix.crate }}" \
            --target thumbv7em-none-eabi \
            --no-default-features \
            ${{ matrix.feature_args }} \
            --locked

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('Dockerfile') }}

      - name: Build Docker image
        run: |
          docker buildx build \
          --cache-to=type=local,dest=/tmp/.buildx-cache \
          --cache-from=type=local,src=/tmp/.buildx-cache \
          -t dlsz/floresta:latest .
